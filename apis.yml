  - type: UseCases
    data:
      - name: Marketplace Seller Automation
        description: Automate product listing creation, price updates, inventory management, and order
          fulfillment for Amazon marketplace sellers.
      - name: Advertising Campaign Optimization
        description: Build automated bid management and campaign optimization tools using the Amazon Advertising
          API and performance reporting.
      - name: E-Commerce Payment Integration
        description: Add Amazon Pay as a payment option for external e-commerce sites to reduce checkout
          friction and increase conversion rates.
      - name: Voice Commerce and Smart Home
        description: Create Alexa skills for voice-driven shopping, home automation, and customer service
          interactions.
      - name: Affiliate Content Monetization
        description: Build product recommendation engines and affiliate content sites using the Creators
          API for real-time Amazon product data.
  - type: Integrations
    data:
      - name: Amazon MWS Legacy Migration
        description: SP-API is the modern replacement for the deprecated Amazon Marketplace Web Service
          (MWS) for all seller operations.
      - name: Alexa Smart Home
        description: Integrate smart home devices and services with Alexa voice control using the Smart
          Home Skill API.
      - name: Login with Amazon
        description: OAuth 2.0 authentication for all Amazon developer APIs including SP-API, Advertising
          API, and ASK via Login with Amazon (LWA).
      - name: Amazon Associates Program
        description: Affiliate program integration for the Creators API and Product Advertising API for
          commission-based product promotion.
      - name: Fire OS and Android
        description: Amazon Appstore SDK for Fire OS and Android apps with in-app purchasing and device
          targeting capabilities.
