  - Amazon
  - Advertising
  - Alexa
  - E-Commerce
  - Marketplace
  - Payments
  - Voice
apis:
  - aid: amazon:selling-partner-api
    name: Amazon Selling Partner API
    tags:
      - E-Commerce
      - Fulfillment
      - Marketplace
      - Orders
      - Sellers
    humanURL: https://developer-docs.amazon.com/sp-api
    baseURL: https://sellingpartnerapi-na.amazon.com
    properties:
      - type: Documentation
        url: https://developer-docs.amazon.com/sp-api
      - type: OpenAPI
        url: openapi/amazon-selling-partner-api-openapi.yml
      - type: JSONSchema
        url: json-schema/selling-partner-order-schema.json
    description: The Amazon Selling Partner API (SP-API) is a RESTful API that enables Amazon sellers
      and vendors to programmatically manage their marketplace operations including listings, orders,
      payments, reports, and fulfillment. It replaces the deprecated Amazon Marketplace Web Service (MWS)
      and provides access to region-specific endpoints for North America, Europe, and Far East marketplaces.
  - aid: amazon:advertising-api
    name: Amazon Advertising API
    tags:
      - Advertising
      - Campaigns
      - Marketing
      - Sponsored Products
    humanURL: https://advertising.amazon.com/API/docs/en-us/reference/api-overview
    baseURL: https://advertising-api.amazon.com
    properties:
      - type: Documentation
        url: https://advertising.amazon.com/API/docs/en-us/reference/api-overview
      - type: OpenAPI
        url: openapi/amazon-advertising-api-openapi.yml
    description: The Amazon Advertising API enables programmatic management of advertising campaigns on
      Amazon including Sponsored Products, Sponsored Brands, and Sponsored Display campaigns across various
      marketplaces. Developers can create, manage, and optimize campaigns, access reporting data, and
      manage budgets and targeting.
  - aid: amazon:creators-api
    name: Amazon Creators API
    tags:
      - Affiliates
      - Content Creators
      - E-Commerce
      - Products
    humanURL: https://affiliate-program.amazon.com/creatorsapi/docs/en-us/introduction
    baseURL: https://affiliate-program.amazon.com/creatorsapi
    properties:
      - type: Documentation
        url: https://affiliate-program.amazon.com/creatorsapi/docs/en-us/introduction
    description: The Amazon Creators API provides programmatic access to Amazon product data for publishers,
      influencers, and affiliate partners. It is the recommended replacement for the Product Advertising
      API and requires Amazon Associates membership with qualifying sales history.
  - aid: amazon:pay-api
    name: Amazon Pay API
    tags:
      - Checkout
      - E-Commerce
      - Payments
      - Subscriptions
    humanURL: https://developer.amazon.com/docs/amazon-pay-api-v2/introduction.html
    baseURL: https://pay-api.amazon.com
    properties:
      - type: Documentation
        url: https://developer.amazon.com/docs/amazon-pay-api-v2/introduction.html
      - type: OpenAPI
        url: openapi/amazon-pay-api-openapi.yml
    description: The Amazon Pay API enables merchants to integrate Amazon Pay for payment processing on
      their websites and mobile applications. It supports one-time purchases, subscriptions, and recurring
      payments with checkout session management, charge operations, and refund capabilities.
  - aid: amazon:alexa-skills-kit-api
    name: Amazon Alexa Skills Kit API
    tags:
      - Alexa
      - Skills
      - Smart Home
      - Voice
    humanURL: https://developer.amazon.com/en-US/docs/alexa/rest-apis/rest-apis.html
    baseURL: https://api.amazonalexa.com
    properties:
      - type: Documentation
        url: https://developer.amazon.com/en-US/docs/alexa/rest-apis/rest-apis.html
    description: The Alexa Skills Kit (ASK) REST APIs enable developers to create, manage, test, and deploy
      custom voice skills for Alexa-enabled devices including skill manifest management, interaction model
      building, and hosted skill management for voice experiences and smart home integrations.
  - aid: amazon:appstore-api
    name: Amazon Appstore API
    tags:
      - App Store
      - Apps
      - In-App Purchases
      - Mobile
    humanURL: https://www.developer.amazon.com/docs/apps-and-games/documentation.html
    baseURL: https://developer.amazon.com/api/appstore
    properties:
      - type: Documentation
        url: https://www.developer.amazon.com/docs/apps-and-games/documentation.html
    description: The Amazon Appstore Developer APIs provide tools for managing app submissions, testing,
      and monetization through in-app purchases on the Amazon Appstore for Android and Fire OS applications.
